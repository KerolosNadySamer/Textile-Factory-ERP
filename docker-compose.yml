name: textile-erp

x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-local}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_KEY: ${APP_KEY:?Set APP_KEY in the local .env file before starting Docker}
  APP_URL: ${APP_URL:-http://localhost:8080}
  LOG_CHANNEL: stderr
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DOCKER_DB_DATABASE:-textile_erp}
  DB_USERNAME: ${DOCKER_DB_USERNAME:-textile_user}
  DB_PASSWORD: ${DOCKER_DB_PASSWORD:-local_textile_password}
  CACHE_DRIVER: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: file
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379

x-app-service: &app-service
  image: textile-erp-app:local
  restart: unless-stopped
  environment: *app-environment
  volumes:
    - app-storage:/var/www/storage
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - textile-network

services:
  app:
    <<: *app-service
    build:
      context: .
      target: app

  nginx:
    image: textile-erp-web:local
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - "${DOCKER_HTTP_PORT:-8080}:80"
    volumes:
      - app-storage:/var/www/storage:ro
    depends_on:
      - app
    networks:
      - textile-network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DOCKER_DB_DATABASE:-textile_erp}
      MYSQL_USER: ${DOCKER_DB_USERNAME:-textile_user}
      MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-local_textile_password}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-local_root_password}
    ports:
      - "${DOCKER_MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DOCKER_DB_ROOT_PASSWORD:-local_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - textile-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${DOCKER_REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - textile-network

  queue:
    <<: *app-service
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90

  scheduler:
    <<: *app-service
    command: php artisan schedule:work --no-interaction

volumes:
  app-storage:
  mysql-data:
  redis-data:

networks:
  textile-network:
    driver: bridge
